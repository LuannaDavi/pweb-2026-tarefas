<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ post.titulo }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        header { border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; }
        img { width: 400px; height: auto; }
        a { text-decoration: none; color: blue; }
        footer { border-top: 1px solid #ccc; margin-top: 30px; padding-top: 10px; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1><a href="{% url 'index' %}">Blog</a></h1>
    </header>

    <h2>{{ post.titulo }}</h2>
    <p>Data: {{ post.data }}</p>
    <img src="{{ post.imagem.url }}" alt="{{ post.titulo }}">
    <p>{{ post.texto }}</p>

    <footer>
        <p>Criador: Luanna Davi de Souza</p>
        <p>Curso: Infoweb3m</p>
        <p>Campus: IFRN Campus SPP</p>
        <p>Info: Blog criado para a disciplina de Programação Web</p>
    </footer>

</body>
</html>
